# This file is used for constructing replicate env
image: "r8.im/tencentarc/realesrgan"

build:
  gpu: true
  python_version: "3.11"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
  python_packages:
    - "torch==2.11.0"
    - "torchvision==0.26.0"
    - "numpy"
    - "lmdb"
    - "opencv-python"
    - "PyYAML"
    - "tqdm"
    - "yapf"
    - "basicsr==1.4.2"
    - "facexlib==0.3.0"
    - "gfpgan==1.3.8"

predict: "cog_predict.py:Predictor"
